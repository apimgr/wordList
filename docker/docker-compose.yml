name: wordList

services:
  wordList:
    image: ghcr.io/apimgr/wordList:latest
    container_name: wordList
    restart: unless-stopped
    environment:
      # Hardcoded with sane defaults - NO .env files
      - MODE=production
      - TZ=America/New_York
      # ENABLE_TOR=true is default, no need to specify
    ports:
      # Production: bound to Docker bridge only
      - "172.17.0.1:64580:80"
    volumes:
      - ./rootfs/config/wordList:/config
      - ./rootfs/data/wordList:/data
    networks:
      - wordList

networks:
  wordList:
    name: wordList
    external: false
